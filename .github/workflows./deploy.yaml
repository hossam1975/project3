name: Build and Update Helm

on:
  push:
    branches: [ main ] # هيشتغل أول ما ترفع كود على الماين

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          # بنعمل build وبنديله tag برقم الـ commit عشان يبقى فريد
          docker build -t hossam/backend-mood:${{ github.sha }} ./backend
          docker push hossam/backend-mood:${{ github.sha }}

      - name: Update Helm Values
        run: |
          # الخطوة دي هي اللي "بتكلم" الـ ArgoCD بطريقة غير مباشرة
          # بنغير رقم الـ Tag في ملف values.yaml بالرقم الجديد
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' k8s/values.yaml
          
          # بنرفع التغيير ده للـ Repo تاني
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}"
          git push
